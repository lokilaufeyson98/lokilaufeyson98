<!-- ── PIXEL ROCKET (flying bottom-right → top-left) ── -->
<!-- Pixel size = 6px, rocket centered at origin, rotated -45° to face travel direction -->
<g>
  <animateTransform attributeName="transform" type="translate"
    from="910 195" to="-90 -20" dur="11s" repeatCount="indefinite"/>

  <!-- Static tilt: nose points upper-left -->
  <g transform="rotate(-45)">

    <!-- ░░ NOSE (blue) ░░ -->
    <rect x="0"   y="-30" width="6"  height="6" fill="#58A6FF"/>
    <rect x="-6"  y="-24" width="18" height="6" fill="#58A6FF"/>
    <rect x="-12" y="-18" width="30" height="6" fill="#79BAFF"/>

    <!-- ░░ UPPER BODY ░░ -->
    <rect x="-18" y="-12" width="42" height="6" fill="#c9d1d9"/>

    <!-- ░░ WINDOW ROW ░░ -->
    <rect x="-18" y="-6"  width="12" height="6" fill="#c9d1d9"/>
    <rect x="-6"  y="-6"  width="18" height="6" fill="#7ee8ff"/>
    <rect x="12"  y="-6"  width="12" height="6" fill="#c9d1d9"/>
    <!-- window glare -->
    <rect x="-4"  y="-5"  width="5"  height="5" fill="#d4f5ff" opacity="0.65"/>

    <!-- ░░ MID BODY ░░ -->
    <rect x="-18" y="0"   width="42" height="6" fill="#c9d1d9"/>
    <rect x="-18" y="6"   width="42" height="6" fill="#b8c2cc"/>

    <!-- ░░ LOWER BODY (tapering) ░░ -->
    <rect x="-12" y="12"  width="30" height="6" fill="#c9d1d9"/>
    <rect x="-6"  y="18"  width="18" height="6" fill="#b8c2cc"/>

    <!-- ░░ LANDING LEGS ░░ -->
    <rect x="-12" y="24"  width="6"  height="6" fill="#8b949e"/>
    <rect x="12"  y="24"  width="6"  height="6" fill="#8b949e"/>
    <rect x="-18" y="30"  width="12" height="6" fill="#8b949e"/>
    <rect x="12"  y="30"  width="12" height="6" fill="#8b949e"/>

    <!-- ░░ FLAME (flickering) ░░ -->
    <g class="flame">
      <rect x="-6"  y="36" width="18" height="6" fill="#ff8c00"/>
      <rect x="-12" y="42" width="30" height="6" fill="#ff6a00"/>
      <rect x="-6"  y="48" width="18" height="6" fill="#ffaa00"/>
      <rect x="0"   y="54" width="6"  height="6" fill="#ffee55"/>
    </g>

    <!-- ░░ FLAME FRAME B (alternates with A for pixel-art flicker) ░░ -->
    <g>
      <animate attributeName="opacity" values="0;1;0;0;1;0" dur="0.28s" calcMode="discrete" repeatCount="indefinite"/>
      <rect x="-12" y="36" width="30" height="6" fill="#ffaa00"/>
      <rect x="-6"  y="42" width="18" height="6" fill="#ff8c00"/>
      <rect x="0"   y="48" width="6"  height="6" fill="#ffee55"/>
    </g>

  </g>
</g>

</svg>
