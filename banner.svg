<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
<defs>
  <style>
    @keyframes tw1{0%,100%{opacity:1}50%{opacity:.08}}
    @keyframes tw2{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes tw3{0%,100%{opacity:.7}50%{opacity:.05}}
    .s1{animation:tw1 2.1s ease-in-out infinite}
    .s2{animation:tw1 1.7s 0.5s ease-in-out infinite}
    .s3{animation:tw2 3.2s 0.2s ease-in-out infinite}
    .s4{animation:tw3 2.5s 0.8s ease-in-out infinite}
    .s5{animation:tw2 1.9s 1.3s ease-in-out infinite}
    .s6{animation:tw1 2.8s 0.4s ease-in-out infinite}
    @keyframes flm{
      0%  {opacity:1}
      20% {opacity:.35}
      40% {opacity:.9}
      60% {opacity:.25}
      80% {opacity:.8}
      100%{opacity:1}
    }
    .flame{animation:flm 0.28s step-end infinite}
  </style>
  <radialGradient id="neb1" cx="20%" cy="75%" r="55%">
    <stop offset="0%" stop-color="#0d2040" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#060d1f" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="neb2" cx="78%" cy="20%" r="38%">
    <stop offset="0%" stop-color="#091828" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#060d1f" stop-opacity="0"/>
  </radialGradient>
  <pattern id="pg" width="8" height="8" patternUnits="userSpaceOnUse">
    <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#58A6FF" stroke-opacity="0.045" stroke-width="0.5"/>
  </pattern>
</defs>

